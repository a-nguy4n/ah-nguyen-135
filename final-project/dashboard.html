<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="/final-project/dashboard.css">
</head>
<body>
    <header>
        <h1> Welcome to the Analytics Dashboard!</h1>
    </header>
    <main>
        <section class="analytics-card" id="performance-analytics">
            <h1>Performance Analytics</h1>
            <img src="/final-project/images/performance-icon.png" alt="Performance Analytics Icon">
            <button> View Performance Report</button>
            <button class="pdf-button"> Download Report PDF </button>
        </section>

        <section class="analytics-card" id="behavior-analytics">
            <h1>Behavior Analytics</h1>
            <img src="/final-project/images/behavior-icon.png" alt="Behavior Analytics Icon">
            <button> View Behavior Report</button>
            <button class="pdf-button"> Download Report PDF </button>
        </section>

        <section class="analytics-card" id="engagement-analytics">
            <h1>Engagement Analytics</h1>
            <img src="/final-project/images/engagement-icon.png" alt="Engagement Analytics Icon">
            <button> View Engagement Report</button>
            <button class="pdf-button"> Download Report PDF </button>
        </section>
    </main>
  
</body>
</html>
